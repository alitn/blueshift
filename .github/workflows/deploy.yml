# Deploy pipeline (§7): push to main -> build ONE image (app+worker) -> deploy the
# single prod project with --no-traffic (tag: candidate) -> additive migrations
# (Cloud SQL Auth Proxy) -> candidate-tag smoke (readyz//) -> 10% traffic
# -> scripted watch (WATCH_MINUTES, default 5m; candidate-tag url + Error
# Reporting) -> 100%. Main
# auto-deploys THROUGH the whole progressive rollout; there is no manual promote.
# Rollback = re-point traffic to the prior revision (workflow_dispatch input
# below, or the command printed at the end of a run).
#
# PoC scope: ONE GCP project hosts prod (see docs/ENVIRONMENTS.md). Local dev and
# CI are GCP-free; a separate dev-experiments@ SA + <project>-media-dev bucket
# (provisioned by deploy/gcloud.sh) exist only for local fixture capture and never
# appear here. The Cloud Run service + worker Job are blueshift-app /
# blueshift-worker.
#
# Auth is Workload Identity Federation (no JSON keys): one pool trusting this repo.
# Required configuration:
#   vars.GCP_PROJECT          e.g. blueshift-prod
#   vars.GCP_REGION           us-central1
#   secrets.GCP_WIF_PROVIDER  projects/N/locations/global/workloadIdentityPools/github/providers/github
#   secrets.GCP_DEPLOY_SA     deployer@<project>.iam.gserviceaccount.com
# The rollout no-ops until vars.GCP_PROJECT is set — safe to land before provisioning.
#
# Env/secret matrix per service is documented in deploy/README.md; the names below
# must stay in lockstep with deploy/gcloud.sh (SA, SQL instance, bucket, secret
# ids). Migrations run from this workflow through the Cloud SQL Auth Proxy against
# the checked-out migrations/ tree — the single migration source shared with
# `make demo` and the DB-backed tests.
name: deploy

on:
  push:
    branches: [main]
    # Only run the ~13-min progressive rollout when the shipped runtime can
    # actually change. Docs/tasks/design, *.md, and the PR-only workflow never
    # alter the image, so pushes touching only those skip deploy entirely.
    # web/tests/** is excluded on purpose: it is not part of the built artifact.
    # Dockerfile stage 1 runs `vite build` from web/ src + config into web/build,
    # and the Playwright specs, helpers, and committed baselines under web/tests/
    # are outside that entry graph (vite roots at src/, vitest globs src/**);
    # stage 2 embeds only web/build into internal/webembed/dist and the Go
    # binaries never reference web/tests; stage 3 ships only the two binaries.
    # So a test-only change cannot alter the image bytes. workflow_dispatch below
    # stays as the manual override for any case this filter misses.
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'migrations/**'
      - 'web/**'
      - '!web/tests/**'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile'
      - '.dockerignore'
      - 'deploy/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      rollback_to_revision:
        description: "Re-point 100% traffic to this Cloud Run revision (leave blank to run a normal build + progressive rollout)."
        required: false
        default: ""

permissions:
  contents: read
  id-token: write # WIF

jobs:
  # ---------------------------------------------------------------------- e2e --
  # Trunk gate (m1-e2e-gates-trunk): stand up the demo stack and run the FULL
  # Playwright suite (flow, visual, token-conformance, rtl, axe across the
  # desktop-1440 + laptop-1280 projects) against it, exactly as pr.yml's `e2e`
  # job does. `make check` (the pre-commit/commit gate) excludes Playwright, and
  # the loop pushes straight to main, so pr.yml's `e2e` never ran on the shipped
  # commits — which is how a red golden path (upload->READY timeout + stale
  # token-conformance) reached prod. This job restores that guard ON THE TRUNK:
  # the `rollout` job below `needs: [e2e]`, so a red e2e SKIPS the rollout
  # (fail-closed — no e2e pass => no deploy). Visual regression runs here too
  # (against the committed Linux baselines in web/tests/__screenshots__/), so a
  # UI drift blocks the deploy, not just a manually-triggered baselines run.
  #
  # `if:` mirrors `rollout` EXACTLY so e2e runs precisely when a rollout is
  # intended and is skipped otherwise: it does NOT run on a manual `rollback`
  # dispatch (that emergency path stays independent and unblocked), and it
  # no-ops before provisioning (vars.GCP_PROJECT unset => e2e + rollout both
  # skip, unchanged from today). Because the ifs are identical there is no case
  # where e2e is skipped while a rollout should proceed. The paths filter on the
  # trigger already excludes docs-/CI-/test-only pushes (web/tests/** included),
  # so — like pr.yml's e2e early-exit — those never reach this job at all; no
  # per-step docs detector is needed here.
  #
  # SETUP is mirrored from pr.yml's `e2e` job (same Postgres 18 + pgvector
  # service, same DEMO_DATABASE_URL the demo stack resolves, same bun/node/go +
  # ffmpeg + Playwright-browser caches, same `make e2e`). It runs in parallel
  # with any independent work; the rollout gates on it (~2-3 min added before a
  # build ever starts, which is the point: never build/deploy a red trunk).
  e2e:
    if: ${{ vars.GCP_PROJECT != '' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.rollback_to_revision == '')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 40

    # LOCKSTEP with pr.yml/baselines.yml: same Postgres 18 + pgvector service
    # container. The demo stack Playwright boots resolves this via
    # DEMO_DATABASE_URL (the default `postgres` database) before any docker
    # fallback.
    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DEMO_DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      # setup-node stays: Playwright has a hard Node runtime dependency, so
      # `make e2e` pins it to node via `bunx --bun=false`.
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache bun modules
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('web/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      # Pinned 8.1.x BtbN static GPL build (ADR 0002) for dev/prod/CI parity —
      # NOT apt ffmpeg (bookworm ships 5.x/6.x). Pinned to an immutable dated
      # autobuild tag + sha256 (never the rolling `latest`); a wrong checksum
      # fails `sha256sum -c` here. LOCKSTEP: this run block is byte-identical in
      # pr.yml (both jobs), baselines.yml, and this deploy.yml e2e job; the
      # Dockerfile `ffmpeg` stage pins the same tag + asset + sha256 (different
      # shell) — bump all five together.
      - name: Install ffmpeg (pinned 8.1.x, checksum-gated)
        run: |
          set -euo pipefail
          FF_TAG=autobuild-2026-07-22-13-36
          FF_ASSET=ffmpeg-n8.1.2-30-g45f1910444-linux64-gpl-8.1.tar.xz
          FF_SHA=4ad0d6eb98bde796841050cf12bf9428e188446bd518b245fb4aa02f25b633a0
          curl -sSfL -o "$FF_ASSET" \
            "https://github.com/BtbN/FFmpeg-Builds/releases/download/${FF_TAG}/${FF_ASSET}"
          echo "${FF_SHA}  ${FF_ASSET}" | sha256sum -c -
          tar -xf "$FF_ASSET" --strip-components=1 -C /tmp
          sudo install -m0755 /tmp/bin/ffmpeg  /usr/local/bin/ffmpeg
          sudo install -m0755 /tmp/bin/ffprobe /usr/local/bin/ffprobe
          hash -r
          ffmpeg -version | head -1
          ffmpeg -version | head -1 | grep -qE ' n?8\.1' \
            || { echo "::error::ffmpeg is not 8.1.x after pinned install"; exit 1; }

      # No migrate CLI install: `make demo` (demo_migrate_seed) applies migrations
      # via `go run -tags 'postgres' …/cmd/migrate`, version-locked to the go.mod
      # require and built by the setup-go step above — no PATH binary needed.

      - name: Install web deps
        run: |
          if [ -f web/package.json ]; then cd web && bun install --frozen-lockfile; fi

      # Cache the Playwright browser download, keyed on the RESOLVED Playwright
      # version so a version bump busts it. On a hit we skip the ~100MB browser
      # download and only (re)install the apt system libs.
      - name: Resolve Playwright version
        id: pw
        run: |
          cd web
          echo "version=$(node -p "require('./node_modules/@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw.outputs.version }}

      - name: Install Playwright browsers
        run: |
          if [ -f web/package.json ] && [ -d web/tests ]; then
            cd web
            if [ "${{ steps.pw-cache.outputs.cache-hit }}" = "true" ]; then
              bunx --bun=false playwright install-deps chromium
            else
              bunx --bun=false playwright install --with-deps chromium
            fi
          fi

      # Playwright's webServer runs `make demo`, which resolves Postgres from
      # DEMO_DATABASE_URL (the service container) before any docker fallback.
      # This is the SAME suite pr.yml runs on PRs — including the visual gate
      # (toHaveScreenshot vs the committed Linux baselines) — now guarding the
      # trunk before any image is built or deployed.
      - name: make e2e
        run: make e2e

      - name: Upload screenshot diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-diffs
          path: |
            web/test-results/
            .artifacts/screens/
          if-no-files-found: ignore

  # ------------------------------------------------------------------ rollout --
  # Build once, push to the project's Artifact Registry, deploy --no-traffic as a
  # 'candidate' tag, migrate, smoke the candidate url, then 10% -> watch -> 100%.
  # Runs on push to main, or on a manual dispatch with NO rollback revision.
  #
  # `needs: [e2e]` makes this fail-closed: the trunk e2e gate above must go GREEN
  # before a single image byte is built. A red e2e leaves e2e failed, and since
  # this job's `if:` carries no status function, GitHub's implicit needs-success
  # requirement skips the rollout — no e2e pass, no deploy. (rollback below does
  # NOT `needs: [e2e]`, so the emergency traffic re-point is never blocked by it.)
  rollout:
    needs: [e2e]
    if: ${{ vars.GCP_PROJECT != '' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.rollback_to_revision == '')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Serialize rollouts: stacked pushes to main queue instead of racing the
    # traffic-split steps against each other. cancel-in-progress: false so a
    # running rollout is never cancelled mid-flight. Scoped to this job (not the
    # workflow) so the manual `rollback` escape hatch is never made to wait
    # behind an in-progress rollout.
    concurrency:
      group: deploy-main
      cancel-in-progress: false
    env:
      REGION: ${{ vars.GCP_REGION || 'us-central1' }}
      PROJECT: ${{ vars.GCP_PROJECT }}
      IMAGE: ${{ vars.GCP_REGION || 'us-central1' }}-docker.pkg.dev/${{ vars.GCP_PROJECT }}/blueshift/app
      RUNTIME_SA: app-runtime@${{ vars.GCP_PROJECT }}.iam.gserviceaccount.com
      SQL_INSTANCE: ${{ vars.GCP_PROJECT }}:${{ vars.GCP_REGION || 'us-central1' }}:blueshift-pg
      BUCKET: ${{ vars.GCP_PROJECT }}-media
      # Candidate watch length in minutes (one /readyz probe per 30s). Default 5
      # is enough for the traffic-free PoC; production scale can set 10+ via the
      # repo variable with no code change.
      WATCH_MINUTES: ${{ vars.WATCH_MINUTES || '5' }}
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Detect first-ever deploy (bootstrap)
        id: detect
        # `gcloud run deploy --no-traffic` is rejected when CREATING a service, and
        # a brand-new service has no prior revision to split traffic against. So
        # decide the path up front: if blueshift-app does not yet exist this is a
        # bootstrap deploy (serve 100% immediately, skip the 10%/watch/100% split);
        # if it exists, run the normal progressive rollout unchanged. Later steps
        # read steps.detect.outputs.bootstrap via their `if:` conditions.
        #
        # FAIL CLOSED: `describe` can also fail for transient/auth/quota/5xx
        # reasons. Treating those as "absent" would drop --no-traffic on a
        # steady-state deploy and route an untested revision 100% live. So set
        # bootstrap=true ONLY when the captured error unambiguously means the
        # service does not exist; on any other error, stop the rollout.
        run: |
          set -euo pipefail
          if out=$(gcloud run services describe blueshift-app --region "$REGION" 2>&1); then
            echo "bootstrap=false" >> "$GITHUB_OUTPUT"
            echo "blueshift-app exists — steady-state progressive rollout."
          elif printf '%s' "$out" | grep -qiE 'not[_ ]?found|could not be found|cannot find|does not exist|\b404\b'; then
            echo "bootstrap=true" >> "$GITHUB_OUTPUT"
            echo "blueshift-app absent — bootstrap deploy (serve 100%, skip traffic split)."
          else
            echo "::error::'gcloud run services describe blueshift-app' failed for a reason other than non-existence; failing closed to preserve --no-traffic protection. Details:"
            printf '%s\n' "$out" | sed 's/^/    /'
            exit 1
          fi

      - name: Build & push image (app + worker in one image)
        run: |
          gcloud auth configure-docker "$REGION-docker.pkg.dev" -q
          docker build -t "$IMAGE:${{ github.sha }}" .
          docker push "$IMAGE:${{ github.sha }}"

      - name: Deploy candidate (tag candidate; --no-traffic in steady state)
        env:
          BOOTSTRAP: ${{ steps.detect.outputs.bootstrap }}
        run: |
          # Steady state: deploy --no-traffic so the previous revision keeps serving
          # until the candidate smoke passes. Bootstrap (first-ever deploy):
          # --no-traffic is rejected when creating a service and there are no users
          # or prior revision, so serve 100% immediately. --tag candidate is kept in
          # both paths so the smoke can address the new revision.
          #
          # --no-invoker-iam-check: the org enforces domain-restricted sharing,
          # which forbids allUsers IAM bindings (FAILED_PRECONDITION), so the
          # service can't be made public that way. Disable the invoker IAM check
          # instead — the app does its own auth.
          NO_TRAFFIC="--no-traffic"
          if [ "$BOOTSTRAP" = "true" ]; then
            NO_TRAFFIC=""
          fi
          # PUBLIC_BASE_URL is the fallback upload-session Origin for non-browser
          # callers of episode create (browsers send their own Origin). Set it to
          # Cloud Run's deterministic url form, which is also in the bucket CORS
          # allowlist emitted by deploy/gcloud.sh. --set-env-vars REPLACES the env
          # on every deploy, so it must be listed alongside the others to survive
          # each rollout.
          #
          # LLM_*: the SERVICE now hosts the free-prompt moment compose seam
          # (m1-prompt-moments — cmd/app builds an llm.Client at boot and
          # fail-fasts in a prod ENV without valid provider coordinates), so it
          # carries the SAME LLM_* set as the worker Job below — one engine
          # config serves the pipeline stages and compose alike. Keep the two
          # blocks in lockstep; the values' rationale is documented on the
          # worker step. ^@^ switches gcloud's list delimiter to @ so values
          # may carry commas, mirroring the worker line's form.
          PROJECT_NUMBER="$(gcloud projects describe "$PROJECT" --format='value(projectNumber)')"
          PUBLIC_BASE_URL="https://blueshift-app-${PROJECT_NUMBER}.${REGION}.run.app"
          gcloud run deploy blueshift-app \
            --image "$IMAGE:${{ github.sha }}" --region "$REGION" \
            $NO_TRAFFIC --tag candidate \
            --no-invoker-iam-check \
            --service-account "$RUNTIME_SA" \
            --add-cloudsql-instances "$SQL_INSTANCE" \
            --set-env-vars "^@^ENV=prod@AUTH_MODE=identity@BLOB_MODE=gcs@GCS_BUCKET=$BUCKET@WORKER_TRIGGER=cloudrun@WORKER_JOB_NAME=blueshift-worker@WORKER_JOB_REGION=$REGION@WORKER_JOB_PROJECT=$PROJECT@PUBLIC_BASE_URL=$PUBLIC_BASE_URL@PIPELINE_STAGES=ingest,transcribe,diarize,moments@LLM_ENGINE_MODE=live@LLM_PROVIDER=gemini@LLM_MODEL=gemini-3.5-flash@LLM_ENDPOINT=https://aiplatform.googleapis.com/v1/projects/$PROJECT/locations/global/publishers/google/models@LLM_PRICE_IN_CENTS_PER_MTOK=150@LLM_PRICE_OUT_CENTS_PER_MTOK=900" \
            --set-secrets "DATABASE_URL=database-url:latest,SESSION_SECRET=session-signing-key:latest,IDP_API_KEY=identity-platform-config:latest" \
            --quiet
          # Same image; ENTRYPOINT overridden to the worker. It never
          # authenticates, but config.Load() validates the auth env in a
          # prod-like ENV, so it carries the same secrets as the service.
          #
          # Sizing (ADR 0002 math): 4 vCPU runs x264 at ~3-4x realtime, so a 2h
          # master ingests in ~45-75 min, well inside the 4h task-timeout with
          # margin; cost stays ~cents at PoC volume. The 1 vCPU / 512Mi / 1h
          # config could never ingest a real episode and caused the mid-ffmpeg
          # SIGKILL that wedged episodes in 'processing'. --task-timeout is the
          # per-attempt deadline (verified via `gcloud run jobs deploy --help`:
          # "in the case of retries, this deadline applies to each attempt"; it
          # accepts a duration string, "4h" = 4 hours, and defaults to seconds
          # when unitless — so the prior "3600" meant 1h). --max-retries stays 2
          # (1 + 2 = 3 attempts). On timeout Cloud Run sends SIGTERM (~10s grace)
          # before SIGKILL; the worker traps it and marks the episode failed.
          # The service also carries PIPELINE_STAGES: the app never runs a
          # stage, but GET /api/episodes/{id}/pipeline displays this active
          # chain for stages that have not run yet (the hover card's pending
          # rows). Keep it in lockstep with the worker Job's value below.
          # Transcribe is ON in prod: ASR_ENGINE_MODE=speech binds the neutral
          # bs-asr-2 label (bumped from bs-asr-1 to mark the 2026-07-24 forced
          # chirp_2 -> chirp_3 engine change; the label->provider mapping is
          # recorded in docs/RUNBOOK.md, and stage_runs provenance rows carry
          # the label each run actually used) to the real provider-backed
          # engine (region/model/project/
          # bucket/language-codes per docs/RUNBOOK.md — the engine constructor
          # validates requiredness at wiring time, and cmd/worker builds the engine
          # ONLY when transcribe is in the active chain, so the cost-safety guards
          # wrap the live billable call). WORKER_TRIGGER=cloudrun makes the
          # worker auto-advance each stage by starting a SEPARATE Job
          # execution (an exec-trigger subprocess would be SIGKILLed when the prior
          # execution's container is torn down, wedging the episode); it inherits
          # this same deployed env, so every downstream execution has the full
          # ASR + LLM config.
          # PIPELINE_STAGES's value has a comma, so the list uses gcloud's ^@^
          # delimiter. Provider names are allowed in this deploy script (CLAUDE.md);
          # nothing here is client-visible — externally the engine is only bs-asr-2.
          #
          # Engine coordinates (prod receipts 2026-07-24 — codified here so a
          # redeploy cannot revert the operational fix):
          #   - ASR_MODEL=chirp_3: the first real prod batch on chirp_2 failed 403
          #     "Permission denied for project … on model chirp_2 locale fa-IR.
          #     It is no longer generally available." — chirp_2's Persian is
          #     closed off for API callers, so chirp_3 is forced, not
          #     preferential. chirp_3 + fa-IR was live-verified on the real prod
          #     audio: 641 words WITH word offsets on the 4-min file.
          #   - ASR_REGION=us: the LITERAL `us` multiregion serving location the
          #     live probes verified (endpoint us-speech.googleapis.com) —
          #     deliberately NOT $REGION, which is the us-central1 COMPUTE region;
          #     the two are independent and must stay decoupled.
          #   - MAX_PROCESS_ATTEMPTS=10: the operational value applied while
          #     retrying the failed prod episode (the two provider errors above
          #     consumed billable attempts against the code default of 5).
          #
          # Diarize AND moments are ON in prod:
          # PIPELINE_STAGES=ingest,transcribe,diarize,moments activates the
          # four-stage chain (moments terminal -> ready) and
          # LLM_ENGINE_MODE=live binds the neutral bs-lm-1 label to the real
          # provider-backed engine — the SAME LLM_* env serves both LLM stages
          # (moments reuses bs-lm-1; no new coordinates). cmd/worker builds an
          # LLM client ONLY for the LLM stages in the active chain, so the
          # cost-safety guards (per-stage idempotency skips + the shared
          # MAX_PROCESS_ATTEMPTS cap) wrap every live billable call; dropping
          # PIPELINE_STAGES back to ingest,transcribe,diarize (or shorter)
          # is the kill switch, no code change.
          #
          # LLM engine coordinates (researched 2026-07-24 against provider docs —
          # the concrete model id is deploy data, never code):
          #   - LLM_MODEL=gemini-3.5-flash: the CURRENT GA flash-class model.
          #     Receipts: ai.google.dev/gemini-api/docs/models lists it stable/GA;
          #     gemini-3-flash is PREVIEW-only, and gemini-3.6-flash GA'd only
          #     2026-07-21 (3 days ago) with its platform regional rollout still
          #     unconfirmed — not deploy-safe yet; gemini-2.5-flash is a
          #     generation behind (2.0's shutdown 2026-06-01 shows the sunset
          #     cadence). Text-anchored diarization is ~2-40k input tokens per
          #     episode -> roughly 0.5-6 cents at this price, flash-class as
          #     specced.
          #   - LLM_ENDPOINT (explicit, GLOBAL): Gemini 3.x on the platform is
          #     served from the global endpoint ONLY — the regional hosts return
          #     404 for these models (verified 2026-07-24), and the engine's
          #     project+region derivation builds a REGIONAL host, so the full
          #     base is pinned here explicitly. Auth is the runtime SA's default
          #     credentials (roles/aiplatform.user, granted by deploy/gcloud.sh).
          #   - LLM_PRICE_*=150/900 integer cents per 1M tokens (provider pricing
          #     page 2026-07-24: $1.50 in / $9.00 out) — the config-row price the
          #     llm_calls audit costs every call with.
          gcloud run jobs deploy blueshift-worker \
            --image "$IMAGE:${{ github.sha }}" --region "$REGION" \
            --command /app/worker \
            --service-account "$RUNTIME_SA" \
            --set-cloudsql-instances "$SQL_INSTANCE" \
            --set-env-vars "^@^ENV=prod@AUTH_MODE=identity@BLOB_MODE=gcs@GCS_BUCKET=$BUCKET@WORKER_TRIGGER=cloudrun@WORKER_JOB_NAME=blueshift-worker@WORKER_JOB_REGION=$REGION@WORKER_JOB_PROJECT=$PROJECT@ASR_ENGINE_MODE=speech@ASR_REGION=us@ASR_MODEL=chirp_3@ASR_PROJECT=$PROJECT@ASR_BUCKET=$BUCKET@ASR_LANGUAGE_CODES=fa=fa-IR@LLM_ENGINE_MODE=live@LLM_PROVIDER=gemini@LLM_MODEL=gemini-3.5-flash@LLM_ENDPOINT=https://aiplatform.googleapis.com/v1/projects/$PROJECT/locations/global/publishers/google/models@LLM_PRICE_IN_CENTS_PER_MTOK=150@LLM_PRICE_OUT_CENTS_PER_MTOK=900@PIPELINE_STAGES=ingest,transcribe,diarize,moments@MAX_PROCESS_ATTEMPTS=10" \
            --set-secrets "DATABASE_URL=database-url:latest,SESSION_SECRET=session-signing-key:latest,IDP_API_KEY=identity-platform-config:latest" \
            --cpu 4 --memory 2Gi \
            --max-retries 2 --task-timeout 4h --quiet

      - name: Run migrations (additive-only) via Cloud SQL Auth Proxy
        run: |
          set -euo pipefail
          curl -sSfL -o cloud-sql-proxy \
            https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.1/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy
          sudo mkdir -p /cloudsql && sudo chown "$USER" /cloudsql
          ./cloud-sql-proxy --unix-socket /cloudsql "$SQL_INSTANCE" &
          PROXY_PID=$!
          for i in $(seq 1 30); do [ -S "/cloudsql/$SQL_INSTANCE/.s.PGSQL.5432" ] && break; sleep 1; done
          # database-url secret is a unix-socket DSN whose host matches the proxy
          # socket dir (postgres://app:...@/blueshift?host=/cloudsql/<instance>).
          DATABASE_URL="$(gcloud secrets versions access latest --secret=database-url --project="$PROJECT")"
          curl -sSfL https://github.com/golang-migrate/migrate/releases/download/v4.19.1/migrate.linux-amd64.tar.gz \
            | tar -xz migrate
          ./migrate -path migrations -database "$DATABASE_URL" up
          kill "$PROXY_PID" 2>/dev/null || true

      - name: Smoke the candidate revision (readyz//)
        # Probe the candidate's TAGGED url BEFORE shifting any traffic: at
        # --no-traffic the base url still serves the previous revision, so only
        # the candidate tag url exercises the newly-deployed code. Checks
        # readiness (DB check wired) and that the SPA shell is served.
        # NOTE: Google Frontend intercepts /healthz on *.run.app edge urls and
        # returns its own 404 (the app never sees it), so the smoke gates on
        # /readyz — which is also the stronger check since it verifies the DB.
        # This is a smoke, not the full functional/visual suite. The Playwright
        # harness (playwright.config.ts, from m0-demo-seed) always boots
        # `make demo` as its webServer and diffs baselines generated on that
        # seeded stack; running the whole suite against a deployed URL is an M1
        # harness task, not wired here. The rollout gates on this smoke — it runs
        # in both the steady-state and bootstrap paths.
        env:
          BOOTSTRAP: ${{ steps.detect.outputs.bootstrap }}
        run: |
          set -euo pipefail
          if [ "$BOOTSTRAP" = "true" ]; then
            # Bootstrap: the sole revision already serves 100% on the service base
            # url (there is no prior revision to hide behind a tag), so smoke that.
            URL=$(gcloud run services describe blueshift-app --region "$REGION" --format=json \
              | jq -r '.status.url')
            { [ -n "$URL" ] && [ "$URL" != "null" ]; } || { echo "::error::could not resolve service url"; exit 1; }
          else
            URL=$(gcloud run services describe blueshift-app --region "$REGION" --format=json \
              | jq -r '.status.traffic[] | select(.tag=="candidate") | .url' | head -n1)
            [ -n "$URL" ] || { echo "::error::could not resolve candidate tag url"; exit 1; }
          fi
          echo "smoking candidate: $URL"
          code() { curl -s -o /dev/null -w '%{http_code}' "$1"; }

          readyz=$(code "$URL/readyz")
          echo "/readyz -> $readyz"
          [ "$readyz" = "200" ] || { echo "::error::/readyz returned $readyz (want 200)"; exit 1; }

          root_code=$(code "$URL/")
          root_ct=$(curl -s -o /dev/null -w '%{content_type}' "$URL/")
          root_len=$(curl -s "$URL/" | wc -c | tr -d ' ')
          echo "/ -> $root_code, content-type=$root_ct, bytes=$root_len"
          [ "$root_code" = "200" ] || { echo "::error::/ returned $root_code (want 200)"; exit 1; }
          case "$root_ct" in text/html*) ;; *) echo "::error::/ content-type $root_ct (want text/html)"; exit 1;; esac
          [ "$root_len" -gt 0 ] || { echo "::error::/ body was empty"; exit 1; }

      - name: Shift 10% traffic
        # Steady state only: bootstrap has no stable revision to split against and
        # already serves 100%. success() preserves the default gate that this step
        # (and the watch/100% below) only run when every prior step passed.
        if: ${{ success() && steps.detect.outputs.bootstrap == 'false' }}
        run: |
          gcloud run services update-traffic blueshift-app \
            --region "$REGION" --to-tags candidate=10 --quiet

      - name: Watch candidate (WATCH_MINUTES; readyz + Error Reporting)
        if: ${{ success() && steps.detect.outputs.bootstrap == 'false' }}
        run: |
          set -euo pipefail
          # Probe the candidate's TAGGED url, not the service base: at 10% traffic
          # ~90% of base-url probes would hit the stable revision and let a broken
          # candidate pass. The tag url always routes to the candidate revision.
          # /readyz (not /healthz): Google Frontend intercepts /healthz on
          # *.run.app edge urls; /readyz reaches the app and also verifies the DB.
          #
          # Watch length is WATCH_MINUTES (vars.WATCH_MINUTES, default 5). One
          # probe every 30s, so the loop count is WATCH_MINUTES * 2.
          ITERS=$(( WATCH_MINUTES * 2 ))
          URL=$(gcloud run services describe blueshift-app --region "$REGION" --format=json \
            | jq -r '.status.traffic[] | select(.tag=="candidate") | .url' | head -n1)
          [ -n "$URL" ] || { echo "::error::could not resolve candidate tag url"; exit 1; }
          echo "watching candidate for ${WATCH_MINUTES}m ($ITERS probes @30s): $URL"
          for i in $(seq 1 "$ITERS"); do
            code=$(curl -s -o /dev/null -w '%{http_code}' "$URL/readyz")
            echo "[$i/$ITERS] readyz=$code"
            [ "$code" = "200" ] || { echo "readyz failed — leaving traffic at 10%, rollback:"; \
              echo "  gcloud run services update-traffic blueshift-app --region $REGION --to-tags candidate=0"; exit 1; }
            # Honest reporting: on query failure, say so — never silently print 0.
            if out=$(gcloud beta error-reporting events list --limit 5 \
              --format 'value(eventTime)' 2>&1); then
              echo "  recent error events (last 5 window): $(printf '%s' "$out" | grep -c .)"
            else
              echo "  WARN: Error Reporting query failed:"; printf '%s\n' "$out" | sed 's/^/    /'
            fi
            sleep 30
          done

      - name: Shift 100% traffic
        if: ${{ success() && steps.detect.outputs.bootstrap == 'false' }}
        run: |
          gcloud run services update-traffic blueshift-app \
            --region "$REGION" --to-tags candidate=100 --quiet
          echo "Rolled out ${{ github.sha }} to 100%."
          echo "Rollback = gcloud run services update-traffic blueshift-app --region $REGION --to-revisions <previous>=100"

  # ----------------------------------------------------------------- rollback --
  # Manual escape hatch: re-point 100% traffic to a known-good prior revision.
  # No build, no migrate — traffic only. Trigger via Actions -> deploy -> Run
  # workflow with the revision name in rollback_to_revision.
  rollback:
    if: ${{ vars.GCP_PROJECT != '' && github.event_name == 'workflow_dispatch' && inputs.rollback_to_revision != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      REGION: ${{ vars.GCP_REGION || 'us-central1' }}
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Re-point 100% traffic to ${{ inputs.rollback_to_revision }}
        run: |
          set -euo pipefail
          gcloud run services update-traffic blueshift-app \
            --region "$REGION" --to-revisions "${{ inputs.rollback_to_revision }}=100" --quiet
          echo "Rolled traffic back to ${{ inputs.rollback_to_revision }} (100%)."
