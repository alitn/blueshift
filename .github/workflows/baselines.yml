# One-shot generator for the CI-canonical visual baselines.
#
# Pixel output differs by OS, so tests/__screenshots__/<project>/ must be
# generated on the CI (Linux) runner where `make demo` runs — a committed darwin
# set would false-fail PR CI. This runs the Playwright suite with
# --update-snapshots against the same demo stack pr.yml's `make e2e` job boots,
# then uploads the result as an artifact. The Architect downloads and commits it
# (the standing one-time, Architect-only baseline authorisation). CI never
# pushes or commits.
#
# LOCKSTEP: the runner env below (service container, DEMO_DATABASE_URL, and the
# setup steps up to "Install Playwright browsers") is copied verbatim from
# pr.yml's `e2e` job. A drift here yields baselines that fail PR CI, so any
# change to those steps in pr.yml must be mirrored here.
name: baselines

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  baselines:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    # LOCKSTEP with pr.yml: same Postgres 18 + pgvector service container. The
    # demo stack Playwright boots resolves this via DEMO_DATABASE_URL (the
    # default `postgres` database), before any docker fallback.
    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    # LOCKSTEP with pr.yml: only DEMO_DATABASE_URL is needed here — the go
    # test suite (TEST_DATABASE_URL) is not run by this baseline generator.
    env:
      DEMO_DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      # bun is the web package manager + build/test/lint/type-check runtime
      # (ADR 0001). setup-node stays because Playwright (make e2e) runs under
      # Node, not bun.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Pinned 8.1.x BtbN static GPL build (ADR 0002) for dev/prod/CI parity —
      # NOT apt ffmpeg (bookworm ships 5.x/6.x). Pinned to an immutable dated
      # autobuild tag + sha256 (never the rolling `latest`); a wrong checksum
      # fails `sha256sum -c` here. LOCKSTEP: this run block is byte-identical in
      # pr.yml (both jobs) and baselines.yml; the Dockerfile `ffmpeg` stage pins
      # the same tag + asset + sha256 (different shell) — bump all four together.
      - name: Install ffmpeg (pinned 8.1.x, checksum-gated)
        run: |
          set -euo pipefail
          FF_TAG=autobuild-2026-07-22-13-36
          FF_ASSET=ffmpeg-n8.1.2-30-g45f1910444-linux64-gpl-8.1.tar.xz
          FF_SHA=4ad0d6eb98bde796841050cf12bf9428e188446bd518b245fb4aa02f25b633a0
          curl -sSfL -o "$FF_ASSET" \
            "https://github.com/BtbN/FFmpeg-Builds/releases/download/${FF_TAG}/${FF_ASSET}"
          echo "${FF_SHA}  ${FF_ASSET}" | sha256sum -c -
          tar -xf "$FF_ASSET" --strip-components=1 -C /tmp
          sudo install -m0755 /tmp/bin/ffmpeg  /usr/local/bin/ffmpeg
          sudo install -m0755 /tmp/bin/ffprobe /usr/local/bin/ffprobe
          hash -r
          ffmpeg -version | head -1
          ffmpeg -version | head -1 | grep -qE ' n?8\.1' \
            || { echo "::error::ffmpeg is not 8.1.x after pinned install"; exit 1; }

      # No migrate CLI install: `make demo` (demo_migrate_seed) applies migrations
      # via `go run -tags 'postgres' …/cmd/migrate`, version-locked to the go.mod
      # require and built by the setup-go step above — no PATH binary needed.

      - name: Install web deps
        run: |
          if [ -f web/package.json ]; then cd web && bun install --frozen-lockfile; fi

      - name: Install Playwright browsers
        run: |
          if [ -f web/package.json ] && [ -d web/tests ]; then cd web && bunx --bun=false playwright install --with-deps chromium; fi

      # Playwright's webServer runs `make demo`, which resolves Postgres from
      # DEMO_DATABASE_URL (the service container) before any docker fallback.
      # --update-snapshots writes the canonical Linux baselines into
      # tests/__screenshots__/<project>/ (writing does not fail the run).
      - name: Generate visual baselines
        run: cd web && bunx --bun=false playwright test --update-snapshots

      # The whole point of the run: hand the freshly generated baselines to the
      # Architect to download and commit. Upload even on failure so a partial
      # run is still inspectable; an empty artifact is a real defect, so error.
      - name: Upload visual baselines
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-baselines
          path: web/tests/__screenshots__/
          if-no-files-found: error
          retention-days: 7

      # Mirrors pr.yml's diff upload so a failed generation run is debuggable.
      - name: Upload Playwright results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: baselines-test-results
          path: web/test-results/
          if-no-files-found: ignore
