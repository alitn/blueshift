# PR gate: make check (incl. DB-backed store/migration tests) + make eval +
# make e2e against the demo stack. Merge is blocked unless green (enable branch
# protection on main requiring this workflow).
name: pr

on:
  pull_request:

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    # Real Postgres 18 with pgvector so the store/migration tests actually RUN
    # here (migration 0001 creates the vector + pg_trgm extensions). Two logical
    # databases share one server: `blueshift_test` for `make check` go tests
    # (TEST_DATABASE_URL) and the default `postgres` for the demo stack that
    # `make e2e` boots (DEMO_DATABASE_URL) — isolated so test rows never leak
    # into the demo's asserted fixtures.
    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/blueshift_test?sslmode=disable
      DEMO_DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      # bun is the web package manager + build/test/lint/type-check runtime
      # (ADR 0001). setup-node stays because Playwright (make e2e) runs under
      # Node, not bun.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # ffmpeg: the worker's media stage (and the demo's sample-episode
      # generation) shell out to it. migrate CLI: `make demo` applies migrations.
      - name: Install system tools (ffmpeg, golang-migrate)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg
          curl -sSfL https://github.com/golang-migrate/migrate/releases/download/v4.19.1/migrate.linux-amd64.tar.gz \
            | tar -xz migrate
          sudo mv migrate /usr/local/bin/migrate
          migrate -version

      # Pinned to the exact version we run locally (`golangci-lint version` =>
      # 2.12.2) so CI lints identically to dev. We do NOT use
      # golangci/golangci-lint-action: it always runs `golangci-lint run`, but
      # the make check step below already invokes it — that is the single source
      # of lint truth (CLAUDE.md), and it also runs locally. The action would
      # double-lint. So we install-only via the official installer, pinned:
      # fetch install.sh from the v2.12.2 tag (its baked-in checksums match that
      # release) AND request v2.12.2 explicitly. The prior `master` + unpinned
      # latest drifted — a mid-release binary bump broke hash_sha256_verify and
      # reddened every PR. Pinning both makes the checksum deterministic. The
      # binary lands on GOPATH/bin, added to PATH so `make check`'s
      # `command -v golangci-lint` guard finds it.
      - name: Install golangci-lint
        run: |
          if [ -f go.mod ]; then
            curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/v2.12.2/install.sh | sh -s -- -b "$(go env GOPATH)/bin" v2.12.2
            echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          fi

      - name: Install web deps
        run: |
          if [ -f web/package.json ]; then cd web && bun install --frozen-lockfile; fi

      # Isolated database for the go test suite; the demo uses the default one.
      - name: Create test database
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -c 'CREATE DATABASE blueshift_test;'

      - name: make check
        run: make check

      # Prove the DB-backed store/migration tests were not silently skipped: with
      # TEST_DATABASE_URL unset they t.Skip(); here they must PASS. A SKIP means
      # the wiring regressed and the gate is lying.
      - name: Assert DB-backed tests ran (no silent skip)
        run: |
          set -o pipefail
          out=$(go test ./internal/store/... -race -count=1 -v 2>&1) || { echo "$out"; exit 1; }
          echo "$out"
          if echo "$out" | grep -q -- '--- SKIP:'; then
            echo "::error::DB-backed store test was SKIPPED — TEST_DATABASE_URL not wired into CI"; exit 1
          fi
          echo "$out" | grep -q -- '--- PASS: TestMigrationsAndQueries' || {
            echo "::error::TestMigrationsAndQueries did not run/pass against the CI Postgres"; exit 1; }

      - name: make eval
        run: make eval

      - name: Install Playwright browsers
        run: |
          if [ -f web/package.json ] && [ -d web/tests ]; then cd web && bunx --bun=false playwright install --with-deps chromium; fi

      # Playwright's webServer runs `make demo`, which resolves Postgres from
      # DEMO_DATABASE_URL (the service container) before any docker fallback.
      - name: make e2e
        run: make e2e

      - name: Upload screenshot diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-diffs
          path: |
            web/test-results/
            .artifacts/screens/
          if-no-files-found: ignore
