# PR gate — TWO parallel jobs so `make e2e` no longer waits behind the whole of
# `make check`, and the web bundle is no longer built twice per run:
#
#   check : the single source of truth (CLAUDE.md) — gofmt/vet/golangci-lint, go
#           test -race (incl. the DB-backed store/migration tests against a real
#           Postgres 18 + pgvector), the web checks, the vendor-leak + hex gates,
#           the web+go build, then `make eval`. Runs on EVERY PR.
#   e2e   : `make e2e` (Playwright) against the demo stack that `make demo` boots.
#           This job builds the SPA itself; because `make check` is no longer in
#           the same job, the old check-then-demo double web build is gone by
#           construction. On docs-only PRs it early-exits SUCCESS (see below).
#
# Merge is blocked unless BOTH jobs are green. Branch protection on `main` must
# require BOTH check contexts: `check` AND `e2e` (it previously required only
# `check` — `e2e` is the new required context to add to the ruleset).
name: pr

on:
  pull_request:

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # check — the full `make check` gate. Kept whole and intact in one job so its
  # semantics (CLAUDE.md's single truth) never fragment.
  # ---------------------------------------------------------------------------
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    # Real Postgres 18 with pgvector so the store/migration tests actually RUN
    # here (migration 0001 creates the vector + pg_trgm extensions). The go test
    # suite uses `blueshift_test` (TEST_DATABASE_URL), created below.
    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/blueshift_test?sslmode=disable

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      # bun is the web package manager AND the build/test/lint/type-check runtime
      # (ADR 0001). No setup-node in this job: it never runs Playwright, and every
      # web check runs under bun (`bunx --bun`); the runner's preinstalled node is
      # a fallback that make check does not rely on.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      # Cache bun's global module cache so `bun install --frozen-lockfile`
      # resolves from disk on a hit. Keyed on the lockfile.
      - name: Cache bun modules
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('web/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      # ffmpeg: internal/media and internal/pipeline tests transcode a real 2s
      # sample with it and t.Skip() when it is absent — installing it keeps those
      # tests RUNNING here, so `make check` semantics are unchanged. No migrate
      # CLI in this job: the store tests apply migrations via the golang-migrate
      # LIBRARY (file://../../migrations), not the binary.
      #
      # Pinned 8.1.x BtbN static GPL build (ADR 0002) for dev/prod/CI parity —
      # NOT apt ffmpeg (bookworm ships 5.x/6.x). Pinned to an immutable dated
      # autobuild tag + sha256 (never the rolling `latest`); a wrong checksum
      # fails `sha256sum -c` here. LOCKSTEP: this run block is byte-identical in
      # pr.yml (both jobs), baselines.yml, and deploy.yml's e2e job; the
      # Dockerfile `ffmpeg` stage pins the same tag + asset + sha256 (different
      # shell) — bump all five together.
      - name: Install ffmpeg (pinned 8.1.x, checksum-gated)
        run: |
          set -euo pipefail
          FF_TAG=autobuild-2026-07-22-13-36
          FF_ASSET=ffmpeg-n8.1.2-30-g45f1910444-linux64-gpl-8.1.tar.xz
          FF_SHA=4ad0d6eb98bde796841050cf12bf9428e188446bd518b245fb4aa02f25b633a0
          curl -sSfL -o "$FF_ASSET" \
            "https://github.com/BtbN/FFmpeg-Builds/releases/download/${FF_TAG}/${FF_ASSET}"
          echo "${FF_SHA}  ${FF_ASSET}" | sha256sum -c -
          tar -xf "$FF_ASSET" --strip-components=1 -C /tmp
          sudo install -m0755 /tmp/bin/ffmpeg  /usr/local/bin/ffmpeg
          sudo install -m0755 /tmp/bin/ffprobe /usr/local/bin/ffprobe
          hash -r
          ffmpeg -version | head -1
          ffmpeg -version | head -1 | grep -qE ' n?8\.1' \
            || { echo "::error::ffmpeg is not 8.1.x after pinned install"; exit 1; }

      # Pinned to the exact version we run locally (`golangci-lint version` =>
      # 2.12.2) so CI lints identically to dev. We do NOT use
      # golangci/golangci-lint-action: it always runs `golangci-lint run`, but
      # the make check step below already invokes it — that is the single source
      # of lint truth (CLAUDE.md), and it also runs locally. The action would
      # double-lint. So we install-only via the official installer, pinned:
      # fetch install.sh from the v2.12.2 tag (its baked-in checksums match that
      # release) AND request v2.12.2 explicitly. The prior `master` + unpinned
      # latest drifted — a mid-release binary bump broke hash_sha256_verify and
      # reddened every PR. Pinning both makes the checksum deterministic. The
      # binary lands on GOPATH/bin, added to PATH so `make check`'s
      # `command -v golangci-lint` guard finds it.
      - name: Install golangci-lint
        run: |
          if [ -f go.mod ]; then
            curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/v2.12.2/install.sh | sh -s -- -b "$(go env GOPATH)/bin" v2.12.2
            echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          fi

      - name: Install web deps
        run: |
          if [ -f web/package.json ]; then cd web && bun install --frozen-lockfile; fi

      # Isolated database for the go test suite; the demo (e2e job) uses the
      # default `postgres` database.
      - name: Create test database
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -c 'CREATE DATABASE blueshift_test;'

      - name: make check
        run: make check

      # Prove the DB-backed store/migration tests were not silently skipped: with
      # TEST_DATABASE_URL unset they t.Skip(); here they must PASS. A SKIP means
      # the wiring regressed and the gate is lying.
      - name: Assert DB-backed tests ran (no silent skip)
        run: |
          set -o pipefail
          out=$(go test ./internal/store/... -race -count=1 -v 2>&1) || { echo "$out"; exit 1; }
          echo "$out"
          if echo "$out" | grep -q -- '--- SKIP:'; then
            echo "::error::DB-backed store test was SKIPPED — TEST_DATABASE_URL not wired into CI"; exit 1
          fi
          echo "$out" | grep -q -- '--- PASS: TestMigrationsAndQueries' || {
            echo "::error::TestMigrationsAndQueries did not run/pass against the CI Postgres"; exit 1; }

      - name: make eval
        run: make eval

  # ---------------------------------------------------------------------------
  # e2e — Playwright against the demo stack. Split out so it runs in parallel
  # with `check` instead of after it. On docs-only PRs the heavy work early-exits
  # SUCCESS: we never skip the JOB (a skipped required check leaves the PR stuck
  # "pending" forever), so the `e2e` context always reports.
  # ---------------------------------------------------------------------------
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    # LOCKSTEP with baselines.yml: same Postgres 18 + pgvector service container.
    # The demo stack Playwright boots resolves this via DEMO_DATABASE_URL (the
    # default `postgres` database) before any docker fallback.
    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DEMO_DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable

    steps:
      # fetch-depth: 0 so the docs-only detector can diff against the merge base.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Skip the browser suite on PRs that touch ONLY *.md / docs/ / tasks/ /
      # design/. We do NOT gate the job with a job-level `if` (a skipped required
      # job can leave the PR "Expected — waiting for status" forever); this job
      # always runs and reports, and the heavy steps below are gated on `run`.
      # Default is RUN on ANY doubt (missing SHAs, merge-base/diff failure, empty
      # diff) so a code PR is never skipped by accident.
      - name: Detect whether e2e must run
        id: decide
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -uo pipefail
          run=true
          if [ -n "${BASE_SHA:-}" ] && [ -n "${HEAD_SHA:-}" ] \
             && mb="$(git merge-base "$BASE_SHA" "$HEAD_SHA" 2>/dev/null)" \
             && changed="$(git diff --name-only "$mb" "$HEAD_SHA" 2>/dev/null)"; then
            # Docs paths: any *.md, plus everything under docs/ tasks/ design/.
            # `nondocs` = the changed files that are NOT docs. run=false only when
            # the diff is non-empty AND nondocs is empty (every path is docs).
            # Computed as a list (not `grep -qv`, whose -q/-v composition differs
            # across grep builds) so the decision is identical on any runner.
            nondocs="$(printf '%s\n' "$changed" \
                       | grep -vE '(\.md$)|(^docs/)|(^tasks/)|(^design/)' || true)"
            if [ -n "$changed" ] && [ -z "$nondocs" ]; then
              run=false
            fi
          fi
          printf 'changed files:\n%s\n' "${changed:-<unavailable>}"
          echo "==> run e2e: $run"
          echo "run=$run" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v5
        if: steps.decide.outputs.run == 'true'
        with:
          go-version: "1.25"
          cache: true

      - uses: oven-sh/setup-bun@v2
        if: steps.decide.outputs.run == 'true'
        with:
          bun-version: "1.3.14"

      # setup-node stays: Playwright has a hard Node runtime dependency, so
      # `make e2e` pins it to node via `bunx --bun=false`.
      - uses: actions/setup-node@v4
        if: steps.decide.outputs.run == 'true'
        with:
          node-version: "22"

      - name: Cache bun modules
        if: steps.decide.outputs.run == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('web/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      # Pinned 8.1.x BtbN static GPL build (ADR 0002) for dev/prod/CI parity —
      # NOT apt ffmpeg (bookworm ships 5.x/6.x). Pinned to an immutable dated
      # autobuild tag + sha256 (never the rolling `latest`); a wrong checksum
      # fails `sha256sum -c` here. LOCKSTEP: this run block is byte-identical in
      # pr.yml (both jobs), baselines.yml, and deploy.yml's e2e job; the
      # Dockerfile `ffmpeg` stage pins the same tag + asset + sha256 (different
      # shell) — bump all five together.
      - name: Install ffmpeg (pinned 8.1.x, checksum-gated)
        if: steps.decide.outputs.run == 'true'
        run: |
          set -euo pipefail
          FF_TAG=autobuild-2026-07-22-13-36
          FF_ASSET=ffmpeg-n8.1.2-30-g45f1910444-linux64-gpl-8.1.tar.xz
          FF_SHA=4ad0d6eb98bde796841050cf12bf9428e188446bd518b245fb4aa02f25b633a0
          curl -sSfL -o "$FF_ASSET" \
            "https://github.com/BtbN/FFmpeg-Builds/releases/download/${FF_TAG}/${FF_ASSET}"
          echo "${FF_SHA}  ${FF_ASSET}" | sha256sum -c -
          tar -xf "$FF_ASSET" --strip-components=1 -C /tmp
          sudo install -m0755 /tmp/bin/ffmpeg  /usr/local/bin/ffmpeg
          sudo install -m0755 /tmp/bin/ffprobe /usr/local/bin/ffprobe
          hash -r
          ffmpeg -version | head -1
          ffmpeg -version | head -1 | grep -qE ' n?8\.1' \
            || { echo "::error::ffmpeg is not 8.1.x after pinned install"; exit 1; }

      # No migrate CLI install: `make demo` (demo_migrate_seed) applies migrations
      # via `go run -tags 'postgres' …/cmd/migrate`, version-locked to the go.mod
      # require and built by the setup-go step above — no PATH binary needed.

      - name: Install web deps
        if: steps.decide.outputs.run == 'true'
        run: |
          if [ -f web/package.json ]; then cd web && bun install --frozen-lockfile; fi

      # Cache the Playwright browser download, keyed on the RESOLVED Playwright
      # version so a version bump busts it. On a hit we skip the ~100MB browser
      # download and only (re)install the apt system libs.
      - name: Resolve Playwright version
        if: steps.decide.outputs.run == 'true'
        id: pw
        run: |
          cd web
          echo "version=$(node -p "require('./node_modules/@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        if: steps.decide.outputs.run == 'true'
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw.outputs.version }}

      - name: Install Playwright browsers
        if: steps.decide.outputs.run == 'true'
        run: |
          if [ -f web/package.json ] && [ -d web/tests ]; then
            cd web
            if [ "${{ steps.pw-cache.outputs.cache-hit }}" = "true" ]; then
              bunx --bun=false playwright install-deps chromium
            else
              bunx --bun=false playwright install --with-deps chromium
            fi
          fi

      # Playwright's webServer runs `make demo`, which resolves Postgres from
      # DEMO_DATABASE_URL (the service container) before any docker fallback.
      - name: make e2e
        if: steps.decide.outputs.run == 'true'
        run: make e2e

      - name: Upload screenshot diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-diffs
          path: |
            web/test-results/
            .artifacts/screens/
          if-no-files-found: ignore
