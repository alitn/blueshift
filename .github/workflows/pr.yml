# PR gate: make check + make eval + make e2e. Merge is blocked unless green
# (enable branch protection on main requiring this workflow).
name: pr

on:
  pull_request:

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install golangci-lint
        run: |
          if [ -f go.mod ]; then
            curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b "$(go env GOPATH)/bin"
            echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          fi

      - name: Install web deps
        run: |
          if [ -f web/package.json ]; then cd web && npm ci; fi

      - name: make check
        run: make check

      - name: make eval
        run: make eval

      - name: Install Playwright browsers
        run: |
          if [ -f web/package.json ] && [ -d web/tests ]; then cd web && npx playwright install --with-deps chromium; fi

      - name: make e2e
        run: make e2e

      - name: Upload screenshot diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-diffs
          path: |
            web/test-results/
            .artifacts/screens/
          if-no-files-found: ignore
